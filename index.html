<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证</title>
    <style>
        body {
            background: #111;
            color: #fff;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui;
        }

        .box {
            display: inline-block;
            background: #222;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        input {
            padding: 10px 14px;
            font-size: 16px;
            width: 220px;
            border: none;
            border-radius: 6px;
            text-align: center;
            outline: none;
        }

        input:active {
            background: #eee;
            transform: scale(0.96);
        }

        button {
            margin-top: 12px;
            padding: 10px 20px;
            font-size: 16px;
            background: #09f;
            color: #fff;
            border: none;
            border-radius: 6px;
        }

        button:active {
            background: #05a;
            transform: scale(0.96);
        }
    </style>
</head>

<body>
    <div class="box">
        <input type="text" id="pwd" placeholder="请输入动态验证码">
        <br>
        <button onclick="check()">验证</button>
    </div>
    <script>
        function check() {
            const now = new Date();
            const Y = now.getFullYear();
            const M = now.getMonth() + 1;
            const D = now.getDate();

            const real = (Y + M + D) * 2042;

            const user = Number(document.getElementById("pwd").value);

            if (user === real) {
                location.href = "birthday.html";
            } else {
                alert("重新尝试");
            }
        }
    </script>
</body>

</html>
